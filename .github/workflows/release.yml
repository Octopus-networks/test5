name: Release APK

# Publishes a downloadable APK to GitHub Releases.
#
# Triggers:
#   - pushing a version tag like `v2.1.0`
#   - manual run (Actions tab → Release APK → Run workflow) with a tag input
#
# NOTE: this currently attaches the **debug-signed** APK (installable for testing).
# A production-signed release APK needs a keystore in repo secrets — see
# docs/ops/release.md ("Upgrading to a signed release"). Releases produced here are
# marked as pre-releases until that is in place.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/use (e.g. v2.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0" || true

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Resolve release tag
        id: meta
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Stage APK with a versioned name
        run: cp app/build/outputs/apk/debug/app-debug.apk "mithaq-${{ steps.meta.outputs.tag }}-debug.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Mithaq ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: true
          files: mithaq-${{ steps.meta.outputs.tag }}-debug.apk
