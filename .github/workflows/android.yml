name: 🚀 Mithaq Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify (Debug)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: 📦 Install Android SDK Platform 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0" || true

      - name: 🔑 Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: 🧹 Clean Project
        run: ./gradlew clean --no-daemon

      - name: 🧪 Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: 🔍 Run Lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: 🔨 Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mithaq-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📋 Upload Build Reports on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7
