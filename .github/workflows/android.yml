name: 🚀 Mithaq Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Set up Android SDK with correct compile SDK version
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Accept all SDK licenses
      - name: ✅ Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      # 5. Install required SDK platforms
      - name: 📦 Install SDK Platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      # 6. Grant execute permission for gradlew
      - name: 🔑 Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 7. Cache Gradle dependencies
      - name: 💾 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 8. Build Debug APK
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      # 9. Upload APK as artifact
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mithaq-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 10. Upload build reports on failure
      - name: 📋 Upload Build Reports on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7
